name: 🤖 V13.8 Daily Portfolio Batch

# ⏰ 작동 스케줄 (Cron)
on:
  schedule:
    # 매일 UTC 21:00 (한국 시간 KST 익일 오전 06:00)에 실행
    # 미국 증시 정규장 마감 직후에 실행되어 내일 시가 진입 타겟을 계산합니다.
    - cron: '0 21 * * *'
  
  # 수동 실행 버튼 (GitHub 페이지에서 직접 Run workflow 가능)
  workflow_dispatch:

jobs:
  run-batch:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 저장소 체크아웃 (Checkout Repository)
        uses: actions/checkout@v3

      - name: 🐍 파이썬 환경 설정 (Set up Python)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # pip 설치 속도 향상을 위한 캐싱

      - name: 📦 의존성 패키지 설치 (Install Dependencies)
        run: |
          python -m pip install --upgrade pip
          # V13.8에서 다이어트된 필수 패키지만 설치합니다.
          pip install numpy pandas yfinance torch supabase pytz

      - name: 🔥 V13.8 배치 봇 실행 (Run Daily Batch)
        env:
          # GitHub Settings -> Secrets에 등록된 Supabase API 키를 불러옵니다.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # 작업 디렉토리를 맞춰줍니다 (My_AI_Advisor 폴더 내부에 스크립트가 있을 경우)
          cd My_AI_Advisor
          python daily_v13_batch.py
