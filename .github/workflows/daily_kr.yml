name: Daily Analysis (Korea)

on:
  schedule:
    # 1. Prediction: UTC 22:00 (한국 시간 다음날 아침 07:00)
    # [변경] 일~목(0-4)에만 실행 -> 한국 시간 기준 월~금 작동
    - cron: '0 22 * * 0-4'
    
    # 2. Monitor A: UTC 23:00 (한국 시간 아침 08:00)
    - cron: '0 23 * * *'
    
    # 3. Monitor B: UTC 00:00 & 00:30 (한국 시간 아침 09:00, 09:30)
    - cron: '0,30 0 * * *'
    
  workflow_dispatch:

jobs:
  run-kr-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./My_AI_Advisor

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        # requirements.txt가 있으면 설치
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
        # [수정] 맨 끝에 python-dotenv를 추가했습니다.
        pip install langchain-community langchain-core langchain-google-genai tavily-python supabase pandas yfinance pykrx plotly python-dotenv

    # [Prediction] UTC 22:00 (한국 07:00)에 실행
    - name: Run Prediction Logic (Signal)
      if: github.event.schedule == '0 22 * * 0-4' || github.event_name == 'workflow_dispatch'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python daily_batch.py kr

    # [Monitor] UTC 23:00, 00:00, 00:30 (한국 08:00, 09:00, 09:30)에 실행
    - name: Run Monitor Logic (Reference)
      if: github.event.schedule == '0 23 * * *' || github.event.schedule == '0,30 0 * * *'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python daily_monitor.py kr
