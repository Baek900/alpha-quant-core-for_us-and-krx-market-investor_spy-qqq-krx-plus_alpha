name: Daily Analysis (Korea)

on:
  schedule:
    - cron: '0 23 * * *'  # 한국 시간 아침 08:00
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./My_AI_Advisor

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # [수정 1] Python 버전을 3.10으로 업그레이드
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # [참고] CPU 버전 PyTorch 설치 (그대로 유지)
    - name: Install PyTorch (CPU version)
      run: pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

    # [통합] 의존성 설치를 한 번에 정리
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install supabase langchain-google-genai langchain-community tavily-python

    # [수정 2] 실행 단계에 API Key 환경변수 모두 포함
    - name: Run Analysis Script (Korea)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}  # 뉴스 분석용 필수
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}  # 뉴스 분석용 필수
      run: python daily_batch.py kr
