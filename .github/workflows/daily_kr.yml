name: Daily Analysis (Korea)

on:
  schedule:
    # 1. Prediction: UTC 22:00 (한국 07:00)
    - cron: '0 22 * * 0-4'
    
    # 2. Monitor A: UTC 23:00 (한국 08:00)
    - cron: '0 23 * * *'
    
    # 3. Monitor B: UTC 00:00 (한국 09:00) [분리됨]
    - cron: '0 0 * * *'

    # 4. Monitor C: UTC 00:30 (한국 09:30) [분리됨]
    - cron: '30 0 * * *'
    
  workflow_dispatch:

jobs:
  run-kr-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./My_AI_Advisor

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install langchain-community langchain-core langchain-google-genai tavily-python supabase pandas yfinance pykrx plotly python-dotenv lightgbm

    # [Prediction] UTC 22:00 (한국 07:00) 일 때만 실행
    - name: Run Prediction Logic (Signal)
      if: github.event.schedule == '0 22 * * 0-4' || github.event_name == 'workflow_dispatch'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python daily_batch.py kr

    # [Monitor] Prediction 시간(UTC 22:00)이 "아닐 때" 실행 (나머지 모든 스케줄 + 수동 실행)
    # 이렇게 하면 08:00, 09:00, 09:30 스케줄을 일일이 적지 않아도 자동으로 실행됩니다.
    - name: Run Monitor Logic (Reference)
      if: github.event.schedule != '0 22 * * 0-4' || github.event_name == 'workflow_dispatch'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python daily_monitor.py kr
