# .github/workflows/daily_v9.yml
name: Daily V9 Allocation (10-Sector)

on:
  schedule:
    # 매주 월~금 미국 장 마감 후 / 한국 시간 20:30 (UTC 11:30) 실행
    - cron: '30 11 * * 1-5'
  workflow_dispatch:

jobs:
  run-v9-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./My_AI_Advisor

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pandas-datareader scikit-learn langchain-community langchain-core langchain-google-genai tavily-python supabase pandas yfinance pykrx plotly python-dotenv lightgbm

    - name: Run V9 Core Inference
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python daily_v9_batch.py
