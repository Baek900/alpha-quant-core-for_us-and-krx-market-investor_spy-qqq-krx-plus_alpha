name: Daily AI Analysis

on:
  schedule:
    # 매일 UTC 22:00 (한국 시간 오전 7:00)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    
    # [핵심] 로봇에게 "My_AI_Advisor 폴더 안에서 작업해"라고 지정
    defaults:
      run:
        working-directory: ./My_AI_Advisor

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install supabase

    - name: Run Analysis Script
      env:
        # GitHub Secrets에서 키 주입
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python daily_batch.py
