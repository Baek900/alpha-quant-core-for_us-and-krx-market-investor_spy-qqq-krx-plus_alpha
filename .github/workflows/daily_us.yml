name: Daily Analysis (USA)

on:
  schedule:
    # 1. Prediction: UTC 11:00 (한국 20:00)

    - cron: '0 11 * * 1-5'
    
    # 2. Monitor A: UTC 13:00 (한국 22:00)
    - cron: '0 13 * * *'

    # 3. Monitor B: UTC 13:30 (한국 22:30)
    - cron: '30 13 * * *'

    # 4. Monitor C: UTC 14:40 (한국 23:40)
    - cron: '40 14 * * *'

  workflow_dispatch:

jobs:
  run-us-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./My_AI_Advisor

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install langchain-community langchain-core langchain-google-genai tavily-python supabase pandas yfinance pykrx plotly python-dotenv

    # [Prediction] UTC 12:00 (한국 21:00) 일 때만 실행
    - name: Run Prediction Logic (Signal)
      if: github.event.schedule == '0 12 * * 1-5' || github.event_name == 'workflow_dispatch'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python daily_batch.py us

    # [Monitor] Prediction 시간(UTC 12:00)이 "아닐 때" 실행 (나머지 모든 스케줄 + 수동 실행)
    # 이렇게 하면 13:00, 13:30, 14:40 스케줄을 일일이 나열하지 않아도 됩니다.
    - name: Run Monitor Logic (Reference)
      if: github.event.schedule != '0 12 * * 1-5' || github.event_name == 'workflow_dispatch'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python daily_monitor.py us
