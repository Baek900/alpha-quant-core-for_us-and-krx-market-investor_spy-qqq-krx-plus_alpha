name: Daily Analysis (USA)

on:
  schedule:
    # 1. Prediction Job: 매일 UTC 11:00 (미국 동부 아침 07:00)
    # [변경] 월~금(1-5)에만 실행 (주말 제외) -> 공휴일 체크는 파이썬 내부에서 수행
    - cron: '0 11 * * 1-5'
    
    # 2. Monitor Job: 매일 UTC 21:00 (미국 장 마감 후)
    # [유지] 주말/휴일 포함 매일 실행하여 뉴스 모니터링
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  run-us-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./My_AI_Advisor

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        # requirements.txt가 있으면 설치
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
        # [수정] 맨 끝에 python-dotenv를 추가했습니다.
        pip install langchain-community langchain-core langchain-google-genai tavily-python supabase pandas yfinance pykrx plotly python-dotenv

    # [Prediction] - 월~금 실행 (휴장일일 경우 내부 로직으로 Skip)
    - name: Run Prediction Logic (Signal)
      if: github.event.schedule == '0 11 * * 1-5' || github.event_name == 'workflow_dispatch'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python daily_batch.py us

    # [Monitor] - 매일 실행
    - name: Run Monitor Logic (Reference)
      if: github.event.schedule == '0 21 * * *'
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python daily_monitor.py us