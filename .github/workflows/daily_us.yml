name: Daily Analysis (USA)

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./My_AI_Advisor

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # PyTorch CPU 버전 (서버 용량 절약)
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        
        # requirements.txt가 있으면 설치
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
        # [최신 문서 반영]
        # langchain-tavily(X) -> langchain-community(O)
        # 1. langchain-community: Tavily 도구가 여기 들어있음
        # 2. langchain-google-genai: Gemini 모델 사용
        # 3. tavily-python: Tavily 기본 SDK
        pip install langchain-community langchain-core langchain-google-genai tavily-python supabase pandas


    - name: Run Analysis Script (USA)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python daily_batch.py us
