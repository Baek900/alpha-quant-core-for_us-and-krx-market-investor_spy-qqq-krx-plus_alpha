name: Daily Analysis (USA)

on:
  schedule:
    - cron: '0 11 * * *'  # 미국 장 마감 후 분석 (시간 확인 필요)
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./My_AI_Advisor

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # [수정 1] Python 버전을 3.10으로 업그레이드 (에러 해결 핵심)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install PyTorch (CPU version)
      run: pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

    # [통합] 의존성 설치 한 번에 처리
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 뉴스 분석용 라이브러리도 여기서 함께 설치
        pip install supabase langchain-google-genai langchain-community tavily-python

    # [수정 2 & 3] 통합 실행 및 'us'로 변경
    - name: Run Analysis Script (USA)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}  # 뉴스 분석 필수
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}  # 뉴스 분석 필수
      run: python daily_batch.py us  # <-- [중요] 'kr'이 아니라 'us'여야 합니다!
