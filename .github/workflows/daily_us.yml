name: Daily Analysis (USA)

on:
  schedule:
    - cron: '0 11 * * *'  # 한국 시간 밤 8시/9시 (미국 장 마감 후)
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./My_AI_Advisor

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # [수정 1] Python 3.10 설정
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # [수정 2] 의존성 설치 (에러 해결 핵심)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        # PyTorch CPU 버전 설치 (서버 부하 감소)
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        
        # requirements.txt가 존재하면 설치하고, 없으면 넘어감
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
        # [중요] 'ModuleNotFoundError' 해결을 위해 필요한 패키지들을 강제로 다시 설치
        # langchain 패키지 자체가 빠져 있어서 에러가 났으므로 여기서 명시해줍니다.
        pip install langchain langchain-community langchain-google-genai tavily-python supabase pandas

    # [수정 3] 실행 스크립트 (US 모드)
    - name: Run Analysis Script (USA)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}  # 뉴스 분석 필수
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}  # 뉴스 분석 필수
      run: python daily_batch.py us
